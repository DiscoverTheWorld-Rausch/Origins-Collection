<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Origins Collection</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Origins Collection</h1>
        <p>Discover the World</p>
        <p>Schokolade, die zum Reisen bewegt</p>
    </header>

    <section class="products">

        <div class="product">
            <img src="images/schokokuss.png" alt="Schokokuss">
            <h2>Schokokuss</h2>
            <p>Germany</p>
        </div>

        <div class="product">
            <img src="images/cookiedough.png" alt="Cookie Dough">
            <h2>Cookie Dough</h2>
            <p>USA</p>
        </div>

        <div class="product">
            <img src="images/boba.png" alt="Boba">
            <h2>Taiwan</h2>
        </div>

        <div class="product">
            <img src="images/majarete.png" alt="Majarete">
            <h2>Majarete</h2>
            <p>Venezuela</p>
        </div>

        <div class="product">
            <img src="images/amaretti.png" alt="Amaretti">
            <h2>Amaretti</h2>
            <p>Italy</p>
        </div>

    </section>

    <script src="js/script.js"></script>

</body>
</html>
